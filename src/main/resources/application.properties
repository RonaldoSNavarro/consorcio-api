# Nome da aplicacao
spring.application.name=consorcio-api
server.port=8081

# Configuracoes de Conexao com o PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/consorcio_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracoes do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway (reutiliza automaticamente as credenciais do datasource via starter)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

api.security.token.secret=${JWT_SECRET:3f2b1c0a4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a}

# OAuth2 Resource Server — Keycloak (ADR 008)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/consorcio}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/consorcio/protocol/openid-connect/certs}

# Keycloak configuration for frontend
keycloak.auth-server-url=${KEYCLOAK_URL:http://localhost:8180}
keycloak.realm=consorcio
keycloak.frontend-client-id=consorcio-frontend

# Loom Virtual Threads configuration
spring.threads.virtual.enabled=true

# HikariCP connection pool tuning
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000

# Multipart configuration (suporta at\u00e9 20MB para arquivos grandes PEP)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Compliance Similarity Threshold
compliance.similarity.threshold=0.90

# Configurações de E-mail (SMTP) para MFA real
spring.mail.host=${SMTP_HOST:smtp.terra.com.br}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:navarro.silva@terra.com.br}
spring.mail.password=${SMTP_PASSWORD:Gtr3005847@}


