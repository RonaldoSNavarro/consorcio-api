# Nome da aplicacao
spring.application.name=consorcio-api
server.port=8081
server.shutdown=graceful

# Configuracoes de Conexao com o PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/consorcio_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracoes do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway (reutiliza automaticamente as credenciais do datasource via starter)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

api.security.token.secret=${JWT_SECRET:minha-chave-secreta-padrao-local-12345678901234567890}


# Loom Virtual Threads configuration
spring.threads.virtual.enabled=true

# HikariCP connection pool tuning
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000

# Multipart configuration (suporta at\u00e9 20MB para arquivos grandes PEP)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Compliance Similarity Threshold
compliance.similarity.threshold=0.90

# Configurações de E-mail (SMTP) para MFA real
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:admin}
spring.mail.password=${SMTP_PASSWORD:admin}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


