# Nome da aplicacao
spring.application.name=consorcio-api

# Configuracoes de Conexao com o PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/consorcio_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracoes do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway (reutiliza automaticamente as credenciais do datasource via starter)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

api.security.token.secret=${JWT_SECRET:3f2b1c0a4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a}

# Loom Virtual Threads configuration
spring.threads.virtual.enabled=true

# HikariCP connection pool tuning
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
