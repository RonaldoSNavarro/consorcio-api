# Test Profile Configuration
spring.application.name=consorcio-api-test
spring.datasource.url=jdbc:postgresql://localhost:5432/consorcio_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

api.security.token.secret=test-secret-key-123456789012345678901234567890
compliance.similarity.threshold=0.90
